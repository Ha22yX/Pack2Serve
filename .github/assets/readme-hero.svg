<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">Pack2Serve project overview</title>
  <desc id="desc">A visual overview of Pack2Serve converting Minecraft modpacks into local dedicated server projects.</desc>
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef8f4"/>
      <stop offset="1" stop-color="#f7f1ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10231d"/>
      <stop offset="1" stop-color="#18223a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#11251f" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1120" height="420" rx="34" fill="url(#canvas)"/>
  <path d="M0 308 C170 255 286 345 448 294 C614 243 742 130 906 170 C1012 196 1072 260 1120 229 L1120 420 L0 420 Z" fill="#dff3eb" opacity="0.74"/>
  <path d="M817 0 C782 70 810 122 888 143 C966 164 1046 125 1120 164 L1120 0 Z" fill="#ebe5ff" opacity="0.78"/>

  <rect x="72" y="54" width="976" height="312" rx="28" fill="#ffffff" filter="url(#shadow)"/>

  <g transform="translate(116 88)">
    <rect width="386" height="244" rx="22" fill="url(#panel)"/>
    <rect x="0" y="0" width="386" height="48" rx="22" fill="#0c1715"/>
    <circle cx="28" cy="24" r="7" fill="#f97373"/>
    <circle cx="52" cy="24" r="7" fill="#f0b429"/>
    <circle cx="76" cy="24" r="7" fill="#47c78a"/>
    <text x="104" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#d7fff0">pack2serve panel</text>

    <text x="30" y="88" font-family="Consolas, monospace" font-size="18" fill="#8ff0c0">import</text>
    <text x="104" y="88" font-family="Consolas, monospace" font-size="18" fill="#eefaf4">AdventurePack.mrpack</text>
    <text x="30" y="122" font-family="Consolas, monospace" font-size="18" fill="#8fb8ff">resolve</text>
    <text x="114" y="122" font-family="Consolas, monospace" font-size="18" fill="#eefaf4">Modrinth + CurseForge files</text>
    <text x="30" y="156" font-family="Consolas, monospace" font-size="18" fill="#f6d36b">build</text>
    <text x="92" y="156" font-family="Consolas, monospace" font-size="18" fill="#eefaf4">Fabric / Forge / NeoForge</text>
    <text x="30" y="190" font-family="Consolas, monospace" font-size="18" fill="#bba7ff">run</text>
    <text x="74" y="190" font-family="Consolas, monospace" font-size="18" fill="#eefaf4">127.0.0.1:8766</text>

    <rect x="28" y="211" width="330" height="1" fill="#314c45"/>
    <text x="30" y="232" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#a7cfc0">Local-first Minecraft server workspace</text>
  </g>

  <g transform="translate(552 88)">
    <text x="0" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#17231f">From modpack to server</text>
    <text x="0" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#5c6f68">Parse packs, fetch resolvable files, install loaders, and manage the generated server.</text>

    <g transform="translate(0 78)">
      <rect width="218" height="74" rx="16" fill="#f4fbf8" stroke="#cfe6dc"/>
      <circle cx="37" cy="37" r="19" fill="#1f7a64"/>
      <path d="M29 38 L37 46 L48 30" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="72" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#1f302b">Import pack</text>
      <text x="72" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#60746d">.mrpack or .zip</text>
    </g>

    <g transform="translate(250 78)">
      <rect width="218" height="74" rx="16" fill="#f7f5ff" stroke="#dad2fb"/>
      <circle cx="37" cy="37" r="19" fill="#6b7fd7"/>
      <path d="M28 39 C34 27 48 27 52 39 C48 51 34 51 28 39 Z" fill="none" stroke="#fff" stroke-width="3"/>
      <circle cx="40" cy="39" r="5" fill="#fff"/>
      <text x="72" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#252847">Resolve files</text>
      <text x="72" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#68668a">Cache remote mods</text>
    </g>

    <g transform="translate(0 180)">
      <rect width="218" height="74" rx="16" fill="#fff9e8" stroke="#eedca4"/>
      <circle cx="37" cy="37" r="19" fill="#f0b429"/>
      <path d="M28 31 H47 V44 H28 Z M32 27 H43" fill="none" stroke="#fff" stroke-width="3" stroke-linejoin="round"/>
      <text x="72" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#3a3014">Build server</text>
      <text x="72" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#796a39">Java and loaders</text>
    </g>

    <g transform="translate(250 180)">
      <rect width="218" height="74" rx="16" fill="#eef7ff" stroke="#c7dff7"/>
      <circle cx="37" cy="37" r="19" fill="#2f80c6"/>
      <path d="M32 27 L50 37 L32 47 Z" fill="#fff"/>
      <text x="72" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#18314a">Run panel</text>
      <text x="72" y="54" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#526f87">Logs and commands</text>
    </g>
  </g>
</svg>
